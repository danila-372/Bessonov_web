{% extends "base.html" %}

{% block title %}Параметры URL{% endblock %}

{% block content %}
  <h1 class="h3 mb-3">Параметры URL</h1>

  {% if params %}
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Название</th>
          <th>Значение</th>
        </tr>
      </thead>
      <tbody>
        {% for name, value in params %}
          <tr>
            <td>{{ name }}</td>
            <td>{{ value }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p class="text-muted">Параметры URL не переданы.</p>
  {% endif %}
{% endblock %}
