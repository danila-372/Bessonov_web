{% extends "base.html" %}

{% block title %}Заголовки запроса{% endblock %}

{% block content %}
  <h1 class="h3 mb-3">Заголовки запроса</h1>

  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Название</th>
        <th>Значение</th>
      </tr>
    </thead>
    <tbody>
      {% for name, value in headers %}
        <tr>
          <td>{{ name }}</td>
          <td>{{ value }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
