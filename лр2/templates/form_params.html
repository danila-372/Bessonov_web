{% extends "base.html" %}

{% block title %}Параметры формы{% endblock %}

{% block content %}
  <h1 class="h3 mb-3">Параметры формы</h1>

  <form method="post" class="row gy-3 mb-4">
    <div class="col-md-6">
      <label class="form-label" for="username">Имя</label>
      <input class="form-control" id="username" name="username" type="text">
    </div>
    <div class="col-md-6">
      <label class="form-label" for="course">Курс</label>
      <input class="form-control" id="course" name="course" type="text">
    </div>
    <div class="col-12">
      <button class="btn btn-primary" type="submit">Отправить</button>
    </div>
  </form>

  {% if form_values %}
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Название</th>
          <th>Значение</th>
        </tr>
      </thead>
      <tbody>
        {% for name, value in form_values %}
          <tr>
            <td>{{ name }}</td>
            <td>{{ value }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% endif %}
{% endblock %}
